name: Deploy to CloudBase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy static site
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install CloudBase CLI
        run: npm install -g @cloudbase/cli@latest

      - name: Login CloudBase CLI
        run: tcb login --apiKeyId ${{ secrets.TCB_SECRET_ID }} --apiKey ${{ secrets.TCB_SECRET_KEY }}

      - name: Clean up non-deployable files
        run: |
          rm -rf .git .github .agents .claude .kiro .vscode tools Doc
          rm -f *.cmd *.xlsx *.py progress.md PERFORMANCE_PARTITION.md README.md skills-lock.json __head_index.html .cloudbaseignore

      - name: Deploy root static files to hosting
        run: tcb hosting deploy ./ / -e ${{ secrets.TCB_ENV_ID }}
