name: Deploy to CloudBase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy static site
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install CloudBase CLI
        run: npm install -g @cloudbase/cli@latest

      - name: Login CloudBase CLI
        run: tcb login --apiKeyId ${{ secrets.TCB_SECRET_ID }} --apiKey ${{ secrets.TCB_SECRET_KEY }}

      - name: Prepare deploy directory
        run: |
          rm -rf .deploy-static
          mkdir -p .deploy-static
          rsync -a \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.agents/' \
            --exclude '.claude/' \
            --exclude '.kiro/' \
            --exclude '.vscode/' \
            --exclude 'tools/' \
            --exclude 'Doc/' \
            --exclude '*.cmd' \
            --exclude '*.xlsx' \
            --exclude '*.py' \
            --exclude 'progress.md' \
            --exclude 'PERFORMANCE_PARTITION.md' \
            --exclude 'README.md' \
            --exclude 'skills-lock.json' \
            --exclude '__head_index.html' \
            --exclude '.cloudbaseignore' \
            ./ .deploy-static/

      - name: Deploy root static files to hosting
        env:
          COS_SDK_KEEPALIVE: "false"
        run: |
          for attempt in 1 2 3; do
            if tcb hosting deploy ./.deploy-static/ / -e ${{ secrets.TCB_ENV_ID }}; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi

            echo "Deploy failed on attempt $attempt, retrying in 15 seconds..."
            sleep 15
          done
