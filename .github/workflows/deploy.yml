name: Deploy to CloudBase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy static site
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            **/package-lock.json
        continue-on-error: true

      - name: Install CloudBase CLI
        run: npm install -g @cloudbase/cli@latest

      - name: Login CloudBase CLI
        run: tcb login --apiKeyId ${{ secrets.TCB_SECRET_ID }} --apiKey ${{ secrets.TCB_SECRET_KEY }}

      - name: Deploy root static files to hosting
        run: |
          tcb hosting deploy ./ / -e ${{ secrets.TCB_ENV_ID }} \
            --ignore ".git/**" \
            --ignore ".github/**" \
            --ignore ".agents/**" \
            --ignore ".claude/**" \
            --ignore ".kiro/**" \
            --ignore ".vscode/**" \
            --ignore "tools/**" \
            --ignore "Doc/**" \
            --ignore "*.cmd" \
            --ignore "*.xlsx" \
            --ignore "*.py" \
            --ignore "progress.md" \
            --ignore "PERFORMANCE_PARTITION.md" \
            --ignore "README.md" \
            --ignore "skills-lock.json" \
            --ignore "__head_index.html"
